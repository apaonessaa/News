volumes:
  persist-db:
  persist-server:    

networks:
  backend-net:
    driver: bridge

services:
  # --- Server ---
  database:
    image: mysql:latest
    volumes:
      - persist-db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWD}
      - MYSQL_USER=${DB_SPRING_USER}
      - MYSQL_PASSWORD=${DB_SPRING_PASSWD}
      - MYSQL_DATABASE=news
    expose:
      - 3306
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s

  server:
    build: NewsAPI
    volumes:
      - persist-server:/home/spring/images
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://database:3306/news
      - SPRING_DATASOURCE_USERNAME=${DB_SPRING_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_SPRING_PASSWD}
    expose:
      - 8081
    networks:
      - backend-net
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      retries: 5
      start_period: 15s
      timeout: 10s

  # --- AI ---
  classifier:
    build: NewsAI/Classifier
    environment:
      - HF_TOKEN=${CLASSIFIER_TOKEN}
      - HF_API=${CLASSIFIER_API}
    expose:
      - 8000
    networks:
      backend-net:
        aliases:
          - ai.classifier
    healthcheck:
      test: curl --fail http://localhost:8000/health || exit 1
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 10s

  corrector:
    build: NewsAI/Corrector
    environment:
      - HF_TOKEN=${CORRECTOR_TOKEN}
      - HF_API=${CORRECTOR_API}
      - HF_MODEL=${CORRECTOR_MODEL}
    expose:
      - 8000
    networks:
      backend-net:
        aliases:
          - ai.corrector
    healthcheck:
      test: curl --fail http://localhost:8000/health || exit 1
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 10s

  # --- Authentication ---
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    volumes:
      - ./NewsAuth/export:/opt/keycloak/data/import/:ro
    environment:
      - KC_IMPORT=/opt/keycloak/data/import/
      - KC_HOSTNAME_STRICT=false  # Accept any hostname in receiving requests
      - KC_HTTP_ENABLED=true      # Enable and expose HTTP port (8080)
      - KC_HTTP_PORT=8080
      - KC_HTTP_RELATIVE_PATH=/
    entrypoint: ["/opt/keycloak/bin/kc.sh", "start-dev", "--import-realm", "--proxy-headers", "xforwarded"]
    ports:
      - 1234:8080
    expose:
      - 8080 # HTTP
      - 9000 # healthcheck
    networks:
      - backend-net

  # --- Reverse proxy ---
  reverse_proxy:
    image: nginx:latest
    volumes:
      - ./NewsProxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    expose:
      - 80
    networks:
      - backend-net
    depends_on:
      server: { condition: service_healthy }
      keycloak: { condition: service_started }
      corrector: { condition: service_started }
      classifier: { condition: service_started }
