events {}

http {
    ### Services
    upstream backend {
        server server:8081;
    }

    upstream corrector {
        server ai.corrector:8000;
    }

    upstream classifier {
        server ai.classifier:8000;
    }

    ### CORS origins
    map $http_origin $allow_origin {
        default "*";
        "~^http://localhost(:[0-9]+)?$" $http_origin;
    }

    server {
        listen 80;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        ### Proxy parameters
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            ### CORS parameters
            add_header 'Access-Control-Allow-Origin' $allow_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,User-Agent,X-Requested-With' always;
            add_header 'Access-Control-Max-Age' 1728000;

            ### --- Routes ---
            location /api/ {
                proxy_pass http://backend;
            }

            # Named capture group
            location ~ ^/ai/(?<service>classifier|corrector)$ {
                set $service $1;

                proxy_pass http://$service/query;
                proxy_read_timeout 300s;
                proxy_connect_timeout 300s;
                proxy_send_timeout 300s;
            }
        }
    }
}